<!-- 1. Paste these styles inside your <head> tag (or at top of this snippet) -->
<style>
  .wt-products-section {
    padding: 60px 20px;
    max-width: 1200px;
    margin: 0 auto;
  }

  .wt-section-header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 36px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .wt-section-title {
    font-size: 2rem;
    font-weight: 800;
    letter-spacing: -1px;
  }

  .wt-section-count {
    font-size: 0.8rem;
    opacity: 0.5;
    font-family: monospace;
    letter-spacing: 1px;
  }

  .wt-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 24px;
  }

  .wt-card {
    border-radius: 14px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.03);
    transition: transform 0.2s, box-shadow 0.2s;
    position: relative;
    animation: wtFadeIn 0.4s ease both;
  }

  .wt-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 16px 48px rgba(0,0,0,0.3);
    border-color: rgba(0, 229, 255, 0.25);
  }

  @keyframes wtFadeIn {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: none; }
  }

  .wt-card-img {
    width: 100%;
    height: 190px;
    object-fit: cover;
    display: block;
    background: rgba(255,255,255,0.05);
  }

  .wt-card-img-placeholder {
    width: 100%;
    height: 190px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.04);
    color: rgba(255,255,255,0.2);
    font-size: 2.5rem;
  }

  .wt-badge {
    position: absolute;
    top: 12px;
    left: 12px;
    font-size: 0.65rem;
    font-family: monospace;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-weight: 700;
    border-radius: 4px;
    padding: 4px 10px;
  }

  .wt-card-body {
    padding: 18px;
  }

  .wt-brand {
    font-size: 0.65rem;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: #00e5ff;
    margin-bottom: 4px;
    font-family: monospace;
  }

  .wt-name {
    font-size: 1.05rem;
    font-weight: 700;
    margin-bottom: 10px;
    line-height: 1.3;
  }

  .wt-specs {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-bottom: 14px;
  }

  .wt-spec {
    font-size: 0.68rem;
    font-family: monospace;
    padding: 3px 8px;
    border-radius: 4px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    opacity: 0.75;
  }

  .wt-card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 4px;
  }

  .wt-price {
    font-size: 1.3rem;
    font-weight: 800;
    color: #00e5ff;
  }

  .wt-btn {
    background: #00e5ff;
    color: #000;
    border: none;
    border-radius: 6px;
    padding: 8px 16px;
    font-size: 0.75rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s;
    text-decoration: none;
    display: inline-block;
  }

  .wt-btn:hover { opacity: 0.82; }

  .wt-loading {
    grid-column: 1/-1;
    text-align: center;
    padding: 60px;
    opacity: 0.4;
    font-family: monospace;
    font-size: 0.85rem;
    letter-spacing: 1px;
  }

  .wt-spinner {
    width: 30px; height: 30px;
    border: 2px solid rgba(255,255,255,0.1);
    border-top-color: #00e5ff;
    border-radius: 50%;
    animation: wtSpin 0.7s linear infinite;
    margin: 0 auto 14px;
  }

  @keyframes wtSpin { to { transform: rotate(360deg); } }

  .wt-empty {
    grid-column: 1/-1;
    text-align: center;
    padding: 60px;
    opacity: 0.35;
    font-family: monospace;
    font-size: 0.85rem;
  }

  @media (max-width: 600px) {
    .wt-grid { grid-template-columns: 1fr; }
  }
</style>

<!-- 2. Paste this HTML where you want the products to appear -->
<section class="wt-products-section">
  <div class="wt-section-header">
    <div class="wt-section-title">Our Laptops</div>
    <div class="wt-section-count" id="wt-count"></div>
  </div>
  <div class="wt-grid" id="wt-grid">
    <div class="wt-loading">
      <div class="wt-spinner"></div>
      Loading products…
    </div>
  </div>
</section>

<!-- 3. Paste this script at the bottom of your page, before </body> -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
  import { getFirestore, collection, query, orderBy, onSnapshot }
    from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCe5PuaGUACBLxvOliU49EZe_UCZcdikw0",
    authDomain: "whattech-74758.firebaseapp.com",
    projectId: "whattech-74758",
    storageBucket: "whattech-74758.firebasestorage.app",
    messagingSenderId: "1078561227403",
    appId: "1:1078561227403:web:0d6898ace013521dfd0a8e"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const statusColors = {
    'In Stock':     { bg: '#00c896', text: '#000' },
    'Low Stock':    { bg: '#ffb700', text: '#000' },
    'Out of Stock': { bg: '#ff4d6d', text: '#fff' },
    'Pre-Order':    { bg: '#7b5ea7', text: '#fff' },
  };

  const q = query(collection(db, 'laptops'), orderBy('createdAt', 'asc'));

  onSnapshot(q, (snapshot) => {
    const grid = document.getElementById('wt-grid');
    const countEl = document.getElementById('wt-count');
    const products = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));

    countEl.textContent = products.length + ' product' + (products.length !== 1 ? 's' : '');

    if (products.length === 0) {
      grid.innerHTML = `<div class="wt-empty">🛒 No products available right now. Check back soon!</div>`;
      return;
    }

    grid.innerHTML = '';
    products.forEach((p, i) => {
      const sc = statusColors[p.status] || { bg: '#7b5ea7', text: '#fff' };
      const card = document.createElement('div');
      card.className = 'wt-card';
      card.style.animationDelay = (i * 0.06) + 's';

      card.innerHTML = `
        <div class="wt-badge" style="background:${sc.bg};color:${sc.text}">${p.status || 'Available'}</div>
        ${p.img
          ? `<img class="wt-card-img" src="${p.img}" alt="${p.name}" loading="lazy">`
          : `<div class="wt-card-img-placeholder">💻</div>`}
        <div class="wt-card-body">
          <div class="wt-brand">${p.brand || ''}</div>
          <div class="wt-name">${p.name || ''}</div>
          <div class="wt-specs">
            ${p.ram     ? `<span class="wt-spec">💾 ${p.ram}</span>` : ''}
            ${p.cpu     ? `<span class="wt-spec">🖥 ${p.cpu}</span>` : ''}
            ${p.storage ? `<span class="wt-spec">💿 ${p.storage}</span>` : ''}
            ${p.gpu     ? `<span class="wt-spec">🎮 ${p.gpu}</span>` : ''}
            ${p.battery ? `<span class="wt-spec">🔋 ${p.battery}</span>` : ''}
          </div>
          <div class="wt-card-footer">
            <div class="wt-price">$${Number(p.price || 0).toLocaleString()}</div>
            <a class="wt-btn" href="#contact">Order Now</a>
          </div>
        </div>`;

      grid.appendChild(card);
    });
  });
</script>
